name: Release Helm chart

on:
  push:
    branches: [master]
    tags:
      - 'v*'
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'
  workflow_dispatch:

jobs:
  # ── GitHub Pages (classic helm repo) ─────────────────────────────────────
  release:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── GHCR OCI registry ─────────────────────────────────────────────────────
  oci:
    name: Publish to GHCR (OCI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push
        run: |
          helm package helm/aws-route53-zone-exporter --destination /tmp/helm
          for tgz in /tmp/helm/aws-route53-zone-exporter-*.tgz; do
            helm push "$tgz" oci://ghcr.io/${{ github.repository_owner }}/charts --version "helm/$(basename "$tgz" | sed -E 's/.*-([0-9]+\.[0-9]+\.[0-9]+)\.tgz/\1/')"
          done
